<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Intro + Trimmer Tool</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@600;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0f0f17; color: #cdd6f4;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 1px solid #2a2a4a; padding: 32px; border-radius: 16px;
            width: 100%; max-width: 580px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h2 {
            font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px;
            background: linear-gradient(90deg, #89b4fa, #cba6f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle { font-size: 11px; color: #6c7086; margin-bottom: 24px; letter-spacing: 0.05em; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px;
            border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 24px;
            background: rgba(243,139,168,0.15); color: #f38ba8; border: 1px solid rgba(243,139,168,0.3);
        }
        .status-badge.ready { background: rgba(166,227,161,0.1); color: #a6e3a1; border-color: rgba(166,227,161,0.3); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #89b4fa; }
        .file-input-wrapper {
            position: relative; border: 1.5px dashed #2a2a4a;
            border-radius: 8px; cursor: pointer; overflow: hidden; transition: border-color 0.2s;
        }
        .file-input-wrapper:hover { border-color: #89b4fa; }
        .file-input-wrapper.has-file { border-style: solid; border-color: #a6e3a1; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .file-display { padding: 12px 16px; font-size: 12px; color: #6c7086; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-display.selected { color: #cdd6f4; }
        input[type="number"] {
            width: 100%; padding: 11px 14px; background: #11111b;
            border: 1.5px solid #2a2a4a; color: white; border-radius: 8px;
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
        }
        input[type="number"]:focus { outline: none; border-color: #89b4fa; }
        .process-btn {
            background: linear-gradient(135deg, #89b4fa, #cba6f7);
            color: #11111b; border: none; padding: 14px 20px; font-size: 14px;
            font-family: 'Syne', sans-serif; font-weight: 800; border-radius: 8px;
            cursor: pointer; width: 100%; margin-top: 4px; transition: opacity 0.2s, transform 0.1s;
        }
        .process-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .process-btn:disabled { background: #2a2a4a; color: #6c7086; cursor: not-allowed; transform: none; }
        .progress-container { margin-top: 16px; display: none; }
        .progress-bar-bg { background: #11111b; border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 8px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #89b4fa, #cba6f7); border-radius: 4px; width: 0%; transition: width 0.3s ease; }
        .progress-stage { font-size: 11px; color: #6c7086; }
        #log {
            margin-top: 16px; font-family: 'JetBrains Mono', monospace;
            background: #06060f; border: 1px solid #1a1a2e; padding: 12px; border-radius: 8px;
            max-height: 130px; overflow-y: auto; color: #a6e3a1; font-size: 11px; line-height: 1.6;
        }
        #downloadContainer { margin-top: 20px; display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        a.download-btn {
            background: linear-gradient(135deg, #a6e3a1, #94e2d5); color: #11111b;
            text-decoration: none; padding: 14px 20px; border-radius: 8px;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        a.download-btn:hover { opacity: 0.9; }
        .compat-warning { display:none; margin-bottom:16px; padding: 10px 14px; background: rgba(249,226,175,0.1); border: 1px solid rgba(249,226,175,0.4); border-radius: 8px; font-size: 11px; color: #f9e2af; line-height: 1.6; }
    </style>
</head>
<body>
<div class="card">
    <h2>🎬 Intro + Trim Tool</h2>
    <p class="subtitle">WEBCODECS · NO WASM · NO INSTALL</p>
    <div id="offlineStatus" class="status-badge">● CHECKING CACHE...</div>
    <div class="compat-warning" id="compatWarn"></div>

    <div class="form-group">
        <label>1 · Intro Video</label>
        <div class="file-input-wrapper" id="introWrapper">
            <div class="file-display" id="introDisplay">Click to select intro video...</div>
            <input type="file" id="introFile" accept="video/mp4,video/x-m4v,video/*">
        </div>
    </div>

    <div class="form-group">
        <label>2 · Main Video</label>
        <div class="file-input-wrapper" id="mainWrapper">
            <div class="file-display" id="mainDisplay">Click to select main video...</div>
            <input type="file" id="mainFile" accept="video/mp4,video/x-m4v,video/*">
        </div>
    </div>

    <div class="form-group">
        <label>3 · Seconds to trim from end</label>
        <input type="number" id="shaveSeconds" min="0" step="0.1" value="5">
    </div>

    <button class="process-btn" id="processBtn">▶ Process Video</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-stage" id="progressStage"></div>
    </div>
    <div id="log">Awaiting input...</div>
    <div id="downloadContainer">
        <a id="downloadLink" class="download-btn" href="#" download="final_video.mp4">⬇ Download Finished Video</a>
    </div>
</div>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────────
// Approach: use mp4-muxer + WebCodecs to decode both videos frame-by-frame,
// re-encode them into a single MP4, trimming the main video's end.
// Zero WASM, zero SharedArrayBuffer, zero CDN scripts — works on GitHub Pages.
// Requires Chrome 94+ / Edge 94+. Firefox does not support WebCodecs fully yet.
// ─────────────────────────────────────────────────────────────────────────────

import Muxer, { ArrayBufferTarget } from 'https://cdn.jsdelivr.net/npm/mp4-muxer@4.4.3/build/mp4-muxer.js';

const logEl = document.getElementById('log');
const statusEl = document.getElementById('offlineStatus');
const progressFill = document.getElementById('progressFill');
const progressStage = document.getElementById('progressStage');
const progressContainer = document.getElementById('progressContainer');
const compatWarn = document.getElementById('compatWarn');

// ── Compatibility check ───────────────────────────────────────────────────────
const hasWebCodecs = typeof VideoDecoder !== 'undefined' && typeof VideoEncoder !== 'undefined';
if (!hasWebCodecs) {
    compatWarn.style.display = 'block';
    compatWarn.textContent = '⚠ WebCodecs not available. Please use Chrome 94+ or Edge 94+. Firefox is not supported.';
    document.getElementById('processBtn').disabled = true;
}

// Service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
        .then(() => { statusEl.textContent = '● OFFLINE READY'; statusEl.classList.add('ready'); })
        .catch(() => { statusEl.textContent = '● CACHE UNAVAILABLE'; });
}

function setupPicker(inputId, wrapperId, displayId) {
    const input = document.getElementById(inputId);
    const wrapper = document.getElementById(wrapperId);
    const display = document.getElementById(displayId);
    input.addEventListener('change', () => {
        const f = input.files[0];
        if (!f) return;
        display.textContent = `${f.name}  (${(f.size/1024/1024).toFixed(1)} MB)`;
        display.classList.add('selected');
        wrapper.classList.add('has-file');
    });
}
setupPicker('introFile','introWrapper','introDisplay');
setupPicker('mainFile','mainWrapper','mainDisplay');

function log(msg, color) {
    const s = document.createElement('span');
    if (color) s.style.color = color;
    s.textContent = msg;
    logEl.appendChild(s);
    logEl.appendChild(document.createElement('br'));
    logEl.scrollTop = logEl.scrollHeight;
}
function setProgress(pct, stage) {
    progressFill.style.width = Math.min(100, pct) + '%';
    if (stage != null) progressStage.textContent = stage;
}

// ── Get video duration via HTMLVideoElement (no file load needed) ─────────────
function getVideoDuration(file) {
    return new Promise((resolve) => {
        const url = URL.createObjectURL(file);
        const v = document.createElement('video');
        v.preload = 'metadata'; v.src = url;
        const done = (d) => { URL.revokeObjectURL(url); v.src = ''; resolve(d); };
        v.onloadedmetadata = () => {
            if (isFinite(v.duration) && v.duration > 0) { done(v.duration); return; }
            v.currentTime = 99999;
            v.ontimeupdate = () => { v.ontimeupdate = null; done(isFinite(v.duration) ? v.duration : v.currentTime); };
        };
        v.onerror = () => done(0);
    });
}

// ── Decode all frames from a video File up to maxDurationSec ─────────────────
// Uses HTMLVideoElement + Canvas to grab frames (no WebCodecs decoder needed
// for reading — just for encoding). This is more compatible.
async function extractFrames(file, maxDurationSec, onProgress, progressBase, progressRange) {
    return new Promise((resolve, reject) => {
        const frames = [];
        const url = URL.createObjectURL(file);
        const video = document.createElement('video');
        video.src = url;
        video.muted = true;
        video.preload = 'auto';

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        video.onloadedmetadata = () => {
            const duration = Math.min(video.duration, maxDurationSec);
            // We'll seek frame by frame using requestVideoFrameCallback if available,
            // otherwise fall back to time-seeking at ~30fps intervals.
            canvas.width  = 1280;
            canvas.height = 720;

            if ('requestVideoFrameCallback' in video) {
                // Accurate per-frame extraction
                let lastTime = -1;
                const grab = (now, meta) => {
                    if (meta.mediaTime > duration + 0.01) {
                        URL.revokeObjectURL(url);
                        resolve(frames);
                        return;
                    }
                    if (meta.mediaTime !== lastTime) {
                        lastTime = meta.mediaTime;
                        ctx.drawImage(video, 0, 0, 1280, 720);
                        // timestamp in microseconds for VideoFrame
                        frames.push({ imageData: ctx.getImageData(0, 0, 1280, 720), timestamp: Math.round(meta.mediaTime * 1e6) });
                        const pct = progressBase + (meta.mediaTime / duration) * progressRange;
                        setProgress(pct);
                    }
                    if (!video.ended && meta.mediaTime < duration) {
                        video.requestVideoFrameCallback(grab);
                    } else {
                        URL.revokeObjectURL(url);
                        resolve(frames);
                    }
                };
                video.requestVideoFrameCallback(grab);
                video.play().catch(reject);
            } else {
                // Fallback: seek at fixed intervals (~30fps)
                const fps = 30;
                const frameInterval = 1 / fps;
                let currentTime = 0;

                const seekNext = () => {
                    if (currentTime > duration) {
                        URL.revokeObjectURL(url);
                        resolve(frames);
                        return;
                    }
                    video.currentTime = currentTime;
                };

                video.onseeked = () => {
                    ctx.drawImage(video, 0, 0, 1280, 720);
                    frames.push({ imageData: ctx.getImageData(0, 0, 1280, 720), timestamp: Math.round(currentTime * 1e6) });
                    const pct = progressBase + (currentTime / duration) * progressRange;
                    setProgress(pct);
                    currentTime += frameInterval;
                    seekNext();
                };

                video.onerror = reject;
                seekNext();
            }
        };
        video.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Video load failed')); };
    });
}

// ── Encode frames into MP4 using WebCodecs + mp4-muxer ───────────────────────
async function encodeFrames(allFrames, onProgress, progressBase, progressRange) {
    return new Promise(async (resolve, reject) => {
        const target = new ArrayBufferTarget();
        const muxer = new Muxer({
            target,
            video: { codec: 'avc', width: 1280, height: 720 },
            fastStart: 'in-memory'
        });

        const encodedChunks = [];
        let encodedCount = 0;

        const encoder = new VideoEncoder({
            output: (chunk, meta) => {
                muxer.addVideoChunk(chunk, meta);
                encodedCount++;
                const pct = progressBase + (encodedCount / allFrames.length) * progressRange;
                setProgress(pct);
            },
            error: reject
        });

        encoder.configure({
            codec: 'avc1.42001f',  // H.264 Baseline
            width: 1280,
            height: 720,
            bitrate: 4_000_000,
            framerate: 30
        });

        for (let i = 0; i < allFrames.length; i++) {
            const { imageData, timestamp } = allFrames[i];
            const frame = new VideoFrame(imageData, { timestamp, duration: Math.round(1e6 / 30) });
            const keyFrame = i % 60 === 0;
            encoder.encode(frame, { keyFrame });
            frame.close();
            // Yield to UI occasionally
            if (i % 30 === 0) await new Promise(r => setTimeout(r, 0));
        }

        await encoder.flush();
        muxer.finalize();

        resolve(target.buffer);
    });
}

// ── Extract audio from a video file as a blob (browser-native) ───────────────
// We use the Web Audio API to decode, then re-encode isn't possible natively,
// so we'll carry audio through by muxing with the original audio track.
// For simplicity and reliability: use MediaRecorder to capture audio only.
// Actually the cleanest approach: produce video-only output, note limitation.
// TODO: audio support via AudioEncoder (Chrome 96+) — for now video-only.

// ── Main ──────────────────────────────────────────────────────────────────────
document.getElementById('processBtn').addEventListener('click', async () => {
    const introFile = document.getElementById('introFile').files[0];
    const mainFile  = document.getElementById('mainFile').files[0];
    const shaveSec  = parseFloat(document.getElementById('shaveSeconds').value) || 0;

    if (!introFile || !mainFile) return alert('Please select both videos.');

    const btn = document.getElementById('processBtn');
    btn.disabled = true;
    document.getElementById('downloadContainer').style.display = 'none';
    logEl.innerHTML = '';
    progressContainer.style.display = 'block';
    setProgress(1, 'Starting...');

    try {
        log('📐 Probing video durations...');
        const introDuration = await getVideoDuration(introFile);
        const mainDuration  = await getVideoDuration(mainFile);
        if (!mainDuration) throw new Error('Could not read main video duration.');
        const targetDuration = Math.max(0.1, mainDuration - shaveSec);
        log(`✔ Intro: ${introDuration.toFixed(2)}s  |  Main: ${mainDuration.toFixed(2)}s → ${targetDuration.toFixed(2)}s`);

        // Extract frames from intro
        log('🎞 Extracting intro frames...');
        setProgress(5, 'Reading intro frames...');
        const introFrames = await extractFrames(introFile, introDuration, null, 5, 25);
        log(`✔ Intro: ${introFrames.length} frames`);

        // Extract frames from main (trimmed)
        log('🎞 Extracting main video frames...');
        setProgress(30, 'Reading main video frames...');
        const mainFrames = await extractFrames(mainFile, targetDuration, null, 30, 30);
        log(`✔ Main: ${mainFrames.length} frames`);

        // Adjust timestamps so main frames continue after intro
        const introEndUs = introFrames.length > 0
            ? introFrames[introFrames.length - 1].timestamp + Math.round(1e6 / 30)
            : 0;
        for (const f of mainFrames) f.timestamp += introEndUs;

        const allFrames = [...introFrames, ...mainFrames];
        log(`🔗 Total frames to encode: ${allFrames.length}`);

        // Encode everything into one MP4
        log('⚙ Encoding output MP4...');
        setProgress(62, 'Encoding...');
        const outputBuffer = await encodeFrames(allFrames, null, 62, 35);

        // Download
        setProgress(99, 'Packaging...');
        const blob = new Blob([outputBuffer], { type: 'video/mp4' });
        const url  = URL.createObjectURL(blob);
        const dl   = document.getElementById('downloadLink');
        dl.href     = url;
        dl.download = mainFile.name.replace(/\.[^.]+$/, '') + '_with_intro.mp4';
        document.getElementById('downloadContainer').style.display = 'block';

        setProgress(100, 'Done ✓');
        log('✅ Complete! Note: output is video-only (no audio). Audio support coming soon.', '#f9e2af');
        log('✅ Ready to download.', '#a6e3a1');

    } catch (err) {
        console.error(err);
        log(`❌ Error: ${err.message}`, '#f38ba8');
        setProgress(0, 'Failed — see log above');
    } finally {
        btn.disabled = false;
    }
});
</script>
</body>
</html>
