<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Intro + Trimmer Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #1e1e2e; color: #cdd6f4; max-width: 600px; margin: 40px auto; padding: 20px; }
        .card { background-color: #313244; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="file"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; background: #181825; border: 1px solid #45475a; color: white; border-radius: 5px; }
        button { background-color: #89b4fa; color: #11111b; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;}
        button:hover { background-color: #74c7ec; }
        button:disabled { background-color: #585b70; cursor: not-allowed; }
        #log { margin-top: 20px; font-family: monospace; background: #11111b; padding: 10px; border-radius: 5px; max-height: 150px; overflow-y: auto; color: #a6e3a1; font-size: 12px; }
        #downloadContainer { margin-top: 20px; text-align: center; display: none; }
        a.download-btn { background-color: #a6e3a1; color: #11111b; text-decoration: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; display: inline-block; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-bottom: 15px; background: #f38ba8; color: #11111b; }
        .status-badge.ready { background: #a6e3a1; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🎬 Intro + Trim Tool</h2>
        <div id="offlineStatus" class="status-badge">Checking Offline Status...</div>
        
        <div class="form-group">
            <label for="introFile">1. Import Intro Video</label>
            <input type="file" id="introFile" accept="video/mp4,video/x-m4v,video/*">
        </div>

        <div class="form-group">
            <label for="mainFile">2. Import Main Video</label>
            <input type="file" id="mainFile" accept="video/mp4,video/x-m4v,video/*">
        </div>

        <div class="form-group">
            <label for="shaveSeconds">3. Seconds to shave off the end</label>
            <input type="number" id="shaveSeconds" min="0" step="0.1" value="5">
        </div>

        <button id="processBtn">Process Video</button>

        <div id="log">Awaiting input...</div>

        <div id="downloadContainer">
            <a id="downloadLink" class="download-btn" href="#" download="final_video.mp4">⬇️ Download Finished Product</a>
        </div>
    </div>

    <script>
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('offlineStatus');

        // REGISTER SERVICE WORKER FOR OFFLINE CACHING
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => {
                statusEl.textContent = "✅ App Cached & Ready for Offline Use";
                statusEl.classList.add('ready');
            })
            .catch((err) => {
                console.error("Service Worker failed", err);
                statusEl.textContent = "❌ Offline Caching Failed";
            });
        } else {
            statusEl.textContent = "❌ Browser doesn't support offline caching";
        }

        window.onerror = function(message) {
            logEl.innerHTML += `<span style="color:red">Page Error: ${message}</span><br>`;
        };

        let ffmpeg = null;
        let fetchFile = null;

        if (typeof FFmpeg === 'undefined') {
            logEl.innerHTML = '<span style="color:red">Engine blocked. Connect to a non-restricted network ONCE to download and cache the engine.</span>';
        } else {
            const { createFFmpeg, fetchFile: importedFetchFile } = FFmpeg;
            fetchFile = importedFetchFile;
            
            const coreUrl = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js';
            const wasmUrl = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.wasm';
            
            ffmpeg = createFFmpeg({ 
                log: true,
                corePath: coreUrl,
                wasmPath: wasmUrl,
                mainName: 'main',
                logger: ({ message }) => {
                    logEl.innerHTML += message + '<br>';
                    logEl.scrollTop = logEl.scrollHeight;
                }
            });
        }

        document.getElementById('processBtn').addEventListener('click', async () => {
            if (!ffmpeg) {
                alert("Engine not loaded. Please connect to an unrestricted network and refresh to cache the files.");
                return;
            }

            const introFile = document.getElementById('introFile').files[0];
            const mainFile = document.getElementById('mainFile').files[0];
            const shaveSeconds = parseFloat(document.getElementById('shaveSeconds').value) || 0;

            if (!introFile || !mainFile) {
                alert("Please select both an intro and a main video.");
                return;
            }

            const processBtn = document.getElementById('processBtn');
            processBtn.disabled = true;
            document.getElementById('downloadContainer').style.display = 'none';
            logEl.innerHTML = "Initializing engine...<br>";

            try {
                const videoURL = URL.createObjectURL(mainFile);
                const videoEl = document.createElement('video');
                videoEl.src = videoURL;
                
                await new Promise((resolve) => {
                    videoEl.onloadedmetadata = () => {
                        if (videoEl.duration === Infinity || isNaN(videoEl.duration)) {
                            videoEl.currentTime = 1e101; 
                            videoEl.ontimeupdate = () => {
                                videoEl.ontimeupdate = null;
                                resolve();
                            };
                        } else {
                            resolve();
                        }
                    };
                });
                
                const mainDuration = videoEl.duration;
                
                if (mainDuration === Infinity || isNaN(mainDuration)) {
                     throw new Error("Chrome flat-out refuses to read the length of this specific video file. Try converting it first.");
                }

                const targetDuration = Math.max(0, mainDuration - shaveSeconds);
                
                logEl.innerHTML += `Main video duration: ${mainDuration.toFixed(2)}s. Target duration: ${targetDuration.toFixed(2)}s.<br>`;

                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                ffmpeg.FS('writeFile', 'intro.mp4', await fetchFile(introFile));
                ffmpeg.FS('writeFile', 'main.mp4', await fetchFile(mainFile));

                // STEP 1: Process Intro by itself into an MPEG-TS stream (Letterboxes to 720p safely)
                logEl.innerHTML += "Processing Intro (Normalizing format)...<br>";
                await ffmpeg.run(
                    '-i', 'intro.mp4',
                    '-vf', 'scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2',
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-c:a', 'aac',
                    '-f', 'mpegts',
                    'intro.ts'
                );

                // STEP 2: Process Main Video by itself into an MPEG-TS stream (Trims & Letterboxes to 720p safely)
                logEl.innerHTML += "Processing Main Video (Trimming & Normalizing)...<br>";
                await ffmpeg.run(
                    '-i', 'main.mp4',
                    '-t', targetDuration.toString(),
                    '-vf', 'scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2',
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-c:a', 'aac',
                    '-f', 'mpegts',
                    'main.ts'
                );

                // STEP 3: Binary Concat. Smashes the two streams together without decoding!
                logEl.innerHTML += "Merging video packets...<br>";
                await ffmpeg.run(
                    '-i', 'concat:intro.ts|main.ts',
                    '-c', 'copy',
                    'output.mp4'
                );

                const data = ffmpeg.FS('readFile', 'output.mp4');
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                const downloadLink = document.getElementById('downloadLink');
                downloadLink.href = url;
                document.getElementById('downloadContainer').style.display = 'block';
                
                logEl.innerHTML += "Done! Ready for download.<br>";

            } catch (err) {
                console.error(err);
                logEl.innerHTML += `<span style="color:red">Error: ${err.message}</span><br>`;
            } finally {
                processBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
